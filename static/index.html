<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Бронирование номеров</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div id="auth">
        <h2>Вход / Регистрация</h2>
        <input type="text" id="login" placeholder="Логин">
        <input type="password" id="password" placeholder="Пароль">
        <div id="register-fields" style="display:none">
            <input type="text" id="full_name" placeholder="ФИО">
            <input type="text" id="phone" placeholder="Телефон">
        </div>
        <button onclick="login()">Войти</button>
        <button onclick="toggleRegister()">Показать регистрацию</button>
        <button id="register-btn" onclick="register()" style="display:none">Зарегистрироваться</button>
    </div>
    
<div id="client" style="display:none">
    <h2>Доступные номера</h2>
    <div id="rooms"></div>
    
    <h2>Мои заявки</h2>
    <div id="my_bookings">Загрузка...</div>
    
    <h2>Мои оплаты</h2>
    <div id="my_payments">Загрузка...</div>
    
    <button onclick="logout()">Выйти</button>
</div>

    <script src="/static/app.js"></script>
</body>
</html>
